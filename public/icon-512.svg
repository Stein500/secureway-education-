<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F33791;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#336907;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a8f0a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background circle with shadow -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad512)" filter="url(#shadow)" />
  
  <!-- White inner circle -->
  <circle cx="256" cy="220" r="140" fill="white" />
  
  <!-- Balloon emoji (detailed) -->
  <ellipse cx="256" cy="180" rx="80" ry="95" fill="#FF6B9D" />
  <ellipse cx="236" cy="150" rx="20" ry="30" fill="white" opacity="0.4" />
  <polygon points="256,275 240,295 272,295" fill="#FF6B9D" />
  <path d="M256 295 Q262 330 256 365 Q250 400 265 420" stroke="#A3A7A1" stroke-width="5" fill="none" stroke-linecap="round" />
  
  <!-- Small decorative balloons -->
  <ellipse cx="180" cy="300" rx="25" ry="30" fill="#FFD700" opacity="0.6" />
  <ellipse cx="332" cy="290" rx="20" ry="25" fill="#336907" opacity="0.5" />
  
  <!-- Lock badge -->
  <circle cx="380" cy="390" r="85" fill="url(#lockGrad512)" filter="url(#shadow)" />
  <circle cx="380" cy="390" r="75" fill="url(#lockGrad512)" stroke="white" stroke-width="6" />
  
  <!-- Lock icon (detailed) -->
  <rect x="340" y="385" width="80" height="55" rx="8" fill="white" />
  <path d="M352 385 L352 365 C352 345 365 330 380 330 C395 330 408 345 408 365 L408 385" 
        stroke="white" stroke-width="12" fill="none" stroke-linecap="round" />
  <circle cx="380" cy="412" r="8" fill="#336907" />
  <rect x="376" y="412" width="8" height="16" rx="2" fill="#336907" />
  
  <!-- Sparkles -->
  <circle cx="150" cy="150" r="8" fill="white" opacity="0.8" />
  <circle cx="400" cy="120" r="6" fill="white" opacity="0.6" />
  <circle cx="120" cy="380" r="5" fill="white" opacity="0.5" />
</svg>
